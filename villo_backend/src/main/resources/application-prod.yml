spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/villo?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate

  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379

app:
  frontend:
    base-url: ${FRONTEND_BASE_URL}

cookie:
  secure: true
  domain: ${COOKIE_DOMAIN}
  same-site: Lax
